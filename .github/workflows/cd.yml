name: CD

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type"
        required: true
        type: choice
        options:
          - beta
          - stable

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # =================== Release ===================
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release.outputs.released }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      is_prerelease: ${{ steps.release.outputs.is_prerelease }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2
        with:
          egress-policy: audit

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ vars.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - uses: python-semantic-release/python-semantic-release@350c48fcb3ffcdfd2e0a235206bc2ecea6b69df0 # v10
        id: release
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          prerelease: ${{ inputs.release_type == 'beta' }}
          prerelease_token: beta

      - uses: python-semantic-release/publish-action@310a9983a0ae878b29f3aac778d7c77c1db27378 # v10
        if: steps.release.outputs.released == 'true'
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          tag: ${{ steps.release.outputs.tag }}

  # =================== Publish to PyPI ===================
  publish-pypi:
    name: Publish to PyPI
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.release.outputs.tag }}

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - run: uv build

      - name: Publish to PyPI
        run: uv publish

  # =================== Notify Downstream ===================
  notify-downstream:
    name: Notify Downstream
    needs: [release, publish-pypi]
    if: needs.release.outputs.released == 'true' && needs.release.outputs.is_prerelease != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2
        with:
          egress-policy: audit

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ vars.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_KEY }}
          owner: n24q02m
          repositories: n24q02m

      - name: Dispatch core-update
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api repos/n24q02m/n24q02m/dispatches \
            -f event_type=core-update \
            -f 'client_payload[core]=web-core' \
            -f 'client_payload[version]=${{ needs.release.outputs.version }}' \
            -f 'client_payload[tag]=${{ needs.release.outputs.tag }}' \
            -f 'client_payload[release_url]=https://github.com/${{ github.repository }}/releases/tag/${{ needs.release.outputs.tag }}'

  # =================== Create downstream bump issues ===================
  create-downstream-issues:
    name: Create downstream bump issues
    needs: [release, publish-pypi]
    if: needs.release.outputs.released == 'true' && needs.release.outputs.is_prerelease != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2
        with:
          egress-policy: audit

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ vars.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_KEY }}
          owner: n24q02m
          repositories: wet-mcp,knowledge-core

      - name: Create issues in downstream repos
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ needs.release.outputs.version }}
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          set -euo pipefail
          DOWNSTREAM="wet-mcp knowledge-core"
          PKG_NAME="n24q02m-web-core"
          CHANGELOG_URL="https://github.com/n24q02m/web-core/releases/tag/${TAG}"

          for repo in $DOWNSTREAM; do
            title="chore: bump ${PKG_NAME} to ${VERSION}"
            body=$(cat <<EOF
          web-core released stable **${TAG}**.

          **Changelog:** ${CHANGELOG_URL}

          ## Action required

          Bump the \`${PKG_NAME}\` pin in \`pyproject.toml\` and regenerate lockfile:

          \`\`\`bash
          uv lock --upgrade-package ${PKG_NAME}
          \`\`\`

          Then open a PR with title \`fix: bump ${PKG_NAME} to ${VERSION}\`.

          _Auto-created by web-core CD. See \`feedback_core_release_auto_issue.md\`._
          EOF
          )

            existing=$(gh issue list -R "n24q02m/${repo}" --search "in:title \"bump ${PKG_NAME} to ${VERSION}\"" --state all --json number --jq '.[0].number // ""')
            if [ -n "$existing" ]; then
              echo "::notice::Issue already exists in ${repo}: #${existing}"
              continue
            fi
            gh issue create -R "n24q02m/${repo}" --title "$title" --body "$body" --label "dependencies" || \
              gh issue create -R "n24q02m/${repo}" --title "$title" --body "$body" || \
              echo "::warning::Failed to create issue in $repo"
          done
